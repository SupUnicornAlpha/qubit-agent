<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0d0f" />
    <link rel="icon" type="image/png" href="/icon.png" sizes="512x512" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <title>QUBIT — 量化研究 Agent 平台</title>
    <script>
      (function () {
        try {
          var allowed = ["dark-purple", "dark-gray", "light-white", "light-sky", "light-mint"];
          var v = localStorage.getItem("qubit-ui-theme-v1");
          document.documentElement.setAttribute(
            "data-qb-theme",
            allowed.indexOf(v) >= 0 ? v : "dark-purple"
          );
        } catch {
          document.documentElement.setAttribute("data-qb-theme", "dark-purple");
        }
      })();
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; padding: 0; max-width: 100%; overflow-x: hidden; }
      body {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          "SF Pro Display",
          "PingFang SC",
          "Hiragino Sans GB",
          "Segoe UI",
          Roboto,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
