<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0d0f" />
    <link rel="icon" type="image/png" href="/icon.png" sizes="512x512" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <title>QUBIT — 量化研究 Agent 平台</title>
    <script>
      (function () {
        var PALETTES = ["dark-purple", "light-white", "light-sky"];
        var STYLES = ["default", "glassmorphism", "retro-futurism", "industrial", "neon-cyberpunk", "bauhaus", "sci-fi-hud", "comic-book"];
        var LEGACY = { "dark-gray": "dark-purple", "light-mint": "light-white" };
        var root = document.documentElement;
        function normPalette(v) {
          if (PALETTES.indexOf(v) >= 0) return v;
          if (LEGACY[v]) return LEGACY[v];
          return "dark-purple";
        }
        function normStyle(v) {
          if (v === "generative-art") return "retro-futurism";
          return STYLES.indexOf(v) >= 0 ? v : "default";
        }
        try {
          var raw = localStorage.getItem("qubit-ui-appearance-v2");
          if (raw) {
            var j = JSON.parse(raw);
            root.setAttribute("data-qb-theme", normPalette(j.palette));
            root.setAttribute("data-qb-style", normStyle(j.style));
            return;
          }
          var legacy = localStorage.getItem("qubit-ui-theme-v1");
          root.setAttribute("data-qb-theme", normPalette(legacy));
          root.setAttribute("data-qb-style", "default");
        } catch {
          root.setAttribute("data-qb-theme", "dark-purple");
          root.setAttribute("data-qb-style", "default");
        }
      })();
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; padding: 0; max-width: 100%; overflow-x: hidden; }
      body {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          "SF Pro Display",
          "PingFang SC",
          "Hiragino Sans GB",
          "Segoe UI",
          Roboto,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
